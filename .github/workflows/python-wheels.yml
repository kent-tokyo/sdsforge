name: Python Wheels

on:
  push:
    tags:
      - 'py-v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-py-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.os }}-cargo-py-

      - name: Build wheel (maturin)
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --strip --manifest-path sdsforge_py/Cargo.toml --out dist
          manylinux: auto

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Smoke test wheel
        shell: bash
        run: |
          pip install dist/sdsforge-*.whl
          python - <<'PY'
          import json, pathlib, sdsforge

          assert hasattr(sdsforge, "extract_text"), "extract_text missing"
          assert hasattr(sdsforge, "validate"),     "validate missing"

          data = json.loads(
              pathlib.Path("examples/mhlw_allyl_chloride/expected.json").read_text(encoding="utf-8")
          )
          findings = sdsforge.validate(data)
          print(f"smoke OK — validate() returned {len(findings)} findings")
          PY
          python examples/mhlw_allyl_chloride/test_fixture.py

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path sdsforge_py/Cargo.toml --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, sdist]
    permissions:
      id-token: write  # for PyPI trusted publishing

    steps:
      - name: Download wheels (linux)
        uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-latest
          path: dist

      - name: Download wheels (macos)
        uses: actions/download-artifact@v4
        with:
          name: wheels-macos-latest
          path: dist

      - name: Download wheels (windows)
        uses: actions/download-artifact@v4
        with:
          name: wheels-windows-latest
          path: dist

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
